# ============================================
# Docker Compose - 小智笔记全栈部署
# ============================================
# 使用说明:
# 1. 确保 .env 文件存在且配置正确
# 2. 执行: docker-compose up -d
# 3. 前端访问: http://localhost
# 4. 后端 API: http://localhost/api
# ============================================

version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: xiaozhi-backend
    restart: unless-stopped
    ports:
      - "6789:6789"
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/.env:/app/.env:ro
    environment:
      - HOST=0.0.0.0
      - PORT=6789
      - REDIS_URL=redis://:xiaozhi_redis_secure_password_2026@xiaozhi-redis:6379/0
      - DATABASE_URL=mysql+aiomysql://xiaozhi:password@xiaozhi-mysql:3306/xiaozhi_notes?charset=utf8mb4
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - xiaozhi-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: xiaozhi-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - xiaozhi-network

  redis:
    image: redis:7-alpine
    container_name: xiaozhi-redis
    restart: unless-stopped
    # Remove public port exposure - only accessible within Docker network
    # ports:
    #   - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --requirepass xiaozhi_redis_secure_password_2026
    networks:
      - xiaozhi-network

  mysql:
    image: mysql:8.0
    container_name: xiaozhi-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: xiaozhi_notes
      MYSQL_USER: xiaozhi
      MYSQL_PASSWORD: password
      TZ: Asia/Shanghai
    volumes:
      - mysql-data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - xiaozhi-network

networks:
  xiaozhi-network:
    driver: bridge

volumes:
  redis-data:
    driver: local
  mysql-data:
    driver: local
