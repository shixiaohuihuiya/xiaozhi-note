# ============================================
# Docker Compose - 小智笔记快速启动（使用已导入的镜像）
# ============================================
# 使用说明:
# 1. 确保已导入所有镜像:
#    - xiaozhi-backend-latest.tar (后端)
#    - xiaozhi-frontend.tar (前端)
#    - xiaozhi-mysql.tar (MySQL)
#    - xiaozhi-redis.tar (Redis)
# 2. 确保 .env 文件存在且配置正确
# 3. 执行: docker-compose -f docker-compose.quick.yml up -d
# 4. 前端访问: http://localhost
# 5. 后端 API: http://localhost:6789
# ============================================

version: "3.8"

services:
  backend:
    image: xiaozhi-note-backend:latest  # 使用已导入的镜像，不构建
    container_name: xiaozhi-backend
    restart: unless-stopped
    ports:
      - "6789:6789"
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/.env:/app/.env:ro
    environment:
      - HOST=0.0.0.0
      - PORT=6789
      - REDIS_URL=redis://xiaozhi-redis:6379/0
      - DATABASE_URL=mysql+aiomysql://xiaozhi:password@xiaozhi-mysql:3306/xiaozhi_notes?charset=utf8mb4
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - xiaozhi-network

  frontend:
    image: xiaozhi-note-frontend:latest  # 使用已导入的镜像，不构建
    container_name: xiaozhi-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - xiaozhi-network

  redis:
    image: redis:7-alpine
    container_name: xiaozhi-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    networks:
      - xiaozhi-network

  mysql:
    image: mysql:8.0
    container_name: xiaozhi-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: xiaozhi_notes
      MYSQL_USER: xiaozhi
      MYSQL_PASSWORD: password
      TZ: Asia/Shanghai
    volumes:
      - mysql-data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - xiaozhi-network

networks:
  xiaozhi-network:
    driver: bridge

volumes:
  redis-data:
    driver: local
  mysql-data:
    driver: local
