# ============================================
# HTTPS 模板 - 适用于已配置 SSL 证书的生产环境
# ============================================
# 使用说明:
# 1. 将 {{DOMAIN}} 替换为你的域名，如: example.com
# 2. 将 {{BACKEND_HOST}} 替换为后端服务地址，如: localhost:6789
# 3. 将 {{FRONTEND_ROOT}} 替换为前端构建产物目录，如: /usr/share/nginx/html
# 4. 将 {{SSL_CERT_PATH}} 替换为 SSL 证书路径，如: /etc/nginx/ssl/cert.pem
# 5. 将 {{SSL_KEY_PATH}} 替换为 SSL 私钥路径，如: /etc/nginx/ssl/key.pem
# ============================================

# HTTP 强制跳转 HTTPS
server {
    listen 80;
    server_name {{DOMAIN}};

    # ACME 证书验证 (Let's Encrypt / Certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 其他请求全部重定向到 HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS 服务
server {
    listen 443 ssl http2;
    server_name {{DOMAIN}};

    root {{FRONTEND_ROOT}};
    index index.html;

    # SSL 证书配置
    ssl_certificate {{SSL_CERT_PATH}};
    ssl_certificate_key {{SSL_KEY_PATH}};

    # SSL 安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # HSTS (首次部署建议先注释掉，确认 HTTPS 正常后再开启)
    # add_header Strict-Transport-Security "max-age=63072000" always;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|otf)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # API 代理到后端
    location /api/ {
        proxy_pass http://{{BACKEND_HOST}}/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 长连接支持
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 上传文件代理到后端
    location /uploads/ {
        proxy_pass http://{{BACKEND_HOST}}/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 前端路由 History 模式支持
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
