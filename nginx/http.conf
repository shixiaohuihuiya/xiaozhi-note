# ============================================
# HTTP 模板 - 适用于未配置 SSL 证书的环境
# ============================================
# 使用说明:
# 1. 将 {{DOMAIN}} 替换为你的域名，如: example.com
# 2. 将 {{BACKEND_HOST}} 替换为后端服务地址，如: localhost:6789
# 3. 将 {{FRONTEND_ROOT}} 替换为前端构建产物目录，如: /usr/share/nginx/html
# ============================================

server {
    listen 80;
    server_name {{DOMAIN}};

    root {{FRONTEND_ROOT}};
    index index.html;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|otf)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # API 代理到后端
    location /api/ {
        proxy_pass http://{{BACKEND_HOST}}/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 长连接支持
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 上传文件代理到后端
    location /uploads/ {
        proxy_pass http://{{BACKEND_HOST}}/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 前端路由 History 模式支持
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
